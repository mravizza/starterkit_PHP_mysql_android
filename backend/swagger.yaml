openapi: 3.0.3
info:
  title: "{{PROJECT_NAME}} API"
  version: "1.0.0"
  description: "REST API für die Android-App"

servers:
  - url: "https://example.com/api/v1"
    description: "Production"
  - url: "http://localhost:8080/api/v1"
    description: "Local Development"

security:
  - bearerAuth: []

paths:
  # TODO: Endpoints hier definieren
  /config:
    get:
      summary: "Gerätekonfiguration abrufen"
      tags: [Config]
      responses:
        '200':
          description: "Erfolg"
          content:
            application/json:
              schema:
                type: object
        '401':
          description: "Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "64-Hex-Zeichen Token"
